name: lint

on:
  push:
    branches: [master, revive]
  pull_request:

jobs:
  php-lint:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ["8.1", "8.5"]
    container: php:${{ matrix.php }}-cli
    steps:
      - uses: actions/checkout@v4
      - name: Syntax check every PHP file
        run: |
          set -e
          find . -type f -name '*.php' -print -exec php -l {} \;
